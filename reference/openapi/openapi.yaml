openapi: 3.0.3

info:
  title: Retail Identity Service API
  version: "1.0.0"
  description: |
    Identity & Tenant service for Retail Management System.

    Key concepts:
    - Users exist before companies (platform-level identity)
    - Company context is optional during login
    - JWTs may contain userUuid, companyUuid (optional), and roles

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Prevents duplicate POST requests

  schemas:
    # ---------- AUTH ----------
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          format: email
        password:
          type: string
        companyUuid:
          type: string
          description: Optional tenant hint if user belongs to a company

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: >
            JWT with claims:
            - sub: userUuid
            - companyUuid (optional)
            - roles
            - exp
        refreshToken:
          type: string
        expiresIn:
          type: integer
        tokenType:
          type: string
          default: Bearer
        user:
          $ref: '#/components/schemas/UserResponse'

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer

    # ---------- USER ----------
    SignupRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
        phone:
          type: string

    CreateTenantUserRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          format: email
        displayName:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [COMPANY_ADMIN, STORE_MANAGER, CASHIER, INVENTORY_STAFF]

    UserResponse:
      type: object
      properties:
        userUuid:
          type: string
        username:
          type: string
        displayName:
          type: string
        roles:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [pending, active, suspended]
        createdAt:
          type: string
          format: date-time

    # ---------- COMPANY ----------
    CompanyResponse:
      type: object
      properties:
        companyUuid:
          type: string
        companyCode:
          type: string
        companyName:
          type: string
        companyGstin:
          type: string

    # ---------- ERROR ----------
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          nullable: true

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  # ---------- PUBLIC SIGNUP ----------
  /api/v1/signup:
    post:
      summary: Public user signup
      description: Creates a platform-level user (no company yet)
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User created (pending verification)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  # ---------- EMAIL VERIFICATION ----------
  /api/v1/users/verify-email:
    post:
      summary: Verify user email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Email verified
        '400':
          $ref: '#/components/responses/BadRequest'

  # ---------- AUTH ----------
  /api/v1/auth/login:
    post:
      summary: Login and receive JWT + refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/refresh:
    post:
      summary: Exchange refresh token for new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------- TENANT / ADMIN ----------
  /api/v1/users:
    post:
      summary: Create a user inside a company (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantUserRequest'
      responses:
        '201':
          description: User created in tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/{userUuid}:
    get:
      summary: Get user by UUID (tenant-scoped)
      security:
        - bearerAuth: []
      parameters:
        - name: userUuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: Not found
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/tenants/{companyUuid}:
    get:
      summary: Get tenant (company) metadata
      security:
        - bearerAuth: []
      parameters:
        - name: companyUuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Company metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '404':
          description: Not found