openapi: 3.0.3

info:
  title: Retail Identity Service API
  version: "1.0.0"
  description: |
    Identity & Tenant service for Retail Management System.

    Key concepts:
    - Users exist before companies (platform-level identity)
    - Company context is optional during login
    - JWTs may contain userUuid, companyUuid (optional), and roles

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Prevents duplicate POST requests

    UserUuidPath:
      name: userUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User UUID

    CompanyUuidPath:
      name: companyUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Company UUID

  schemas:
    # ---------- COMMON ----------
    UUID:
      type: string
      format: uuid

    DateTime:
      type: string
      format: date-time

    # ---------- AUTH ----------
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: StrongPass@123
        companyUuid:
          allOf:
            - $ref: '#/components/schemas/UUID'
          nullable: true
          description: Optional tenant hint if user belongs to a company
      additionalProperties: false

    LoginResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - tokenType
        - user
      properties:
        accessToken:
          type: string
          description: 'JWT with claims: sub=userUuid, companyUuid (optional), roles, exp'
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int32
          example: 3600
        tokenType:
          type: string
          default: Bearer
          example: Bearer
        user:
          $ref: '#/components/schemas/UserResponse'
      additionalProperties: false

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
      additionalProperties: false

    RefreshResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresIn
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int32
          example: 3600
      additionalProperties: false

    # ---------- USER ----------
    SignupRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: StrongPass@123
        displayName:
          type: string
          example: Sumit Prakash
        phone:
          type: string
          example: "+919876543210"
      additionalProperties: false

    CreateTenantUserRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          format: email
          example: cashier@example.com
        displayName:
          type: string
          example: Store Cashier
        roles:
          type: array
          items:
            type: string
            enum: [COMPANY_ADMIN, STORE_MANAGER, CASHIER, INVENTORY_STAFF]
          example: [CASHIER]
      additionalProperties: false

    UserResponse:
      type: object
      required:
        - userUuid
        - username
        - status
        - createdAt
      properties:
        userUuid:
          allOf:
            - $ref: '#/components/schemas/UUID'
        username:
          type: string
          format: email
        displayName:
          type: string
          nullable: true
        roles:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [pending, active, suspended]
        createdAt:
          $ref: '#/components/schemas/DateTime'
      additionalProperties: false

    EmailVerificationRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          example: verif-1234567890
      additionalProperties: false

    EmailVerificationResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Email verified successfully
      additionalProperties: false

    # ---------- COMPANY ----------
    CompanyResponse:
      type: object
      required:
        - companyUuid
        - companyCode
        - companyName
      properties:
        companyUuid:
          allOf:
            - $ref: '#/components/schemas/UUID'
        companyCode:
          type: string
          example: RET001
        companyName:
          type: string
          example: Retail One Pvt Ltd
        companyGstin:
          type: string
          nullable: true
          example: 29ABCDE1234F1Z5
      additionalProperties: false

    # ---------- ERROR ----------
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Request validation failed
        details:
          type: object
          nullable: true
          additionalProperties: true
      additionalProperties: false

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  # ---------- PUBLIC SIGNUP ----------
  /api/v1/signup:
    post:
      summary: Public user signup
      description: Creates a platform-level user (no company yet)
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User created (pending verification)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  # ---------- EMAIL VERIFICATION ----------
  /api/v1/users/verify-email:
    post:
      summary: Verify user email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------- AUTH ----------
  /api/v1/auth/login:
    post:
      summary: Login and receive JWT + refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/auth/refresh:
    post:
      summary: Exchange refresh token for new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------- TENANT / ADMIN ----------
  /api/v1/users:
    post:
      summary: Create a user inside a company (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantUserRequest'
      responses:
        '201':
          description: User created in tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users/{userUuid}:
    get:
      summary: Get user by UUID (tenant-scoped)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserUuidPath'
      responses:
        '200':
          description: User record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/tenants/{companyUuid}:
    get:
      summary: Get tenant (company) metadata
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CompanyUuidPath'
      responses:
        '200':
          description: Company metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'