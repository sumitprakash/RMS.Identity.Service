openapi: 3.0.3

info:
  title: Retail Identity Service API
  version: "1.0.0"
  description: |
    Identity & Company service for Retail Management System.

    Key concepts:
    - Public signup creates only a global user identity
    - Authenticated users register companies with POST /api/v1/companies
    - Users are global identities and may belong to multiple companies
    - JWTs are user-level and contain sub=userUuid and username; company access is checked against membership in the database
    - Company-scoped APIs use /api/v1/companies/{companyUuid}/...
    - Company membership roles are OWNER, ADMIN, and MEMBER

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Required UUID used to prevent duplicate POST requests

    UserUuidPath:
      name: userUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User UUID

    CompanyUuidPath:
      name: companyUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Company UUID

  schemas:
    # ---------- COMMON ----------
    UUID:
      type: string
      format: uuid

    DateTime:
      type: string
      format: date-time

    # ---------- AUTH ----------
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: StrongPass@123
      additionalProperties: false

    LoginResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - tokenType
        - user
      properties:
        accessToken:
          type: string
          description: 'User-level JWT with claims: sub=userUuid, username, exp'
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int32
          example: 3600
        tokenType:
          type: string
          default: Bearer
          example: Bearer
        user:
          $ref: '#/components/schemas/UserResponse'
      additionalProperties: false

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
      additionalProperties: false

    RefreshResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresIn
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int32
          example: 3600
      additionalProperties: false

    # ---------- USER ----------
    SignupRequest:
      type: object
      required:
        - emailAddress
        - password
        - firstName
        - lastName
        - phoneNumber
      properties:
        emailAddress:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: StrongPass@123
        firstName:
          type: string
          example: First
        middleName:
          type: string
          nullable: true
          example: Middle
        lastName:
          type: string
          example: Last
        phoneNumber:
          type: string
          example: "+15551234567"
      additionalProperties: false

    SignupResponse:
      type: object
      required:
        - userUuid
        - emailAddress
        - status
        - createdAt
      properties:
        userUuid:
          allOf:
            - $ref: '#/components/schemas/UUID'
        emailAddress:
          type: string
          format: email
          example: user@example.com
        status:
          type: string
          enum: [pending]
        createdAt:
          $ref: '#/components/schemas/DateTime'
      additionalProperties: false

    CreateCompanyUserRequest:
      type: object
      required:
        - username
        - companyRole
      properties:
        username:
          type: string
          format: email
          example: cashier@example.com
        displayName:
          type: string
          example: Store User
        companyRole:
          $ref: '#/components/schemas/CompanyRole'
      additionalProperties: false

    UserResponse:
      type: object
      required:
        - userUuid
        - username
        - status
        - createdAt
      properties:
        userUuid:
          allOf:
            - $ref: '#/components/schemas/UUID'
        username:
          type: string
          format: email
        displayName:
          type: string
          nullable: true
        roles:
          type: array
          description: Operational roles only; not used for company membership.
          items:
            type: string
        companyRole:
          allOf:
            - $ref: '#/components/schemas/CompanyRole'
          nullable: true
          description: Present only for company-scoped user responses.
        status:
          type: string
          enum: [pending, active, suspended]
        createdAt:
          $ref: '#/components/schemas/DateTime'
      additionalProperties: false

    EmailVerificationRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          example: verif-1234567890
      additionalProperties: false

    EmailVerificationResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Email verified successfully
      additionalProperties: false

    # ---------- COMPANY ----------
    RegisterCompanyRequest:
      type: object
      required:
        - legalName
        - gstin
        - contactEmailAddress
        - contactPhoneNumber
        - addressLine1
        - city
        - state
        - postalCode
        - country
      properties:
        legalName:
          type: string
          example: Example Retail Pvt Ltd
        tradeName:
          type: string
          nullable: true
          example: Example Retail
        gstin:
          type: string
          description: Mandatory unique Indian GSTIN
          example: 29ABCDE1234F1Z5
        contactEmailAddress:
          type: string
          format: email
          example: accounts@example.com
        contactPhoneNumber:
          type: string
          example: "+919876543211"
        addressLine1:
          type: string
          example: 1 Main Road
        addressLine2:
          type: string
          nullable: true
          example: Near Market
        city:
          type: string
          example: Bengaluru
        state:
          type: string
          example: Karnataka
        postalCode:
          type: string
          example: "560001"
        country:
          type: string
          example: IN
      additionalProperties: false

    RegisterCompanyResponse:
      type: object
      required:
        - companyUuid
        - legalName
        - gstin
        - status
        - createdAt
      properties:
        companyUuid:
          allOf:
            - $ref: '#/components/schemas/UUID'
        legalName:
          type: string
          example: Example Retail Pvt Ltd
        tradeName:
          type: string
          nullable: true
          example: Example Retail
        gstin:
          type: string
          example: 29ABCDE1234F1Z5
        status:
          $ref: '#/components/schemas/CompanyStatus'
        createdAt:
          $ref: '#/components/schemas/DateTime'
      additionalProperties: false

    CurrentUserCompanyResponse:
      type: object
      required:
        - companyUuid
        - legalName
        - gstin
        - status
        - companyRole
        - membershipStatus
        - createdAt
      properties:
        companyUuid:
          allOf:
            - $ref: '#/components/schemas/UUID'
        legalName:
          type: string
          example: Example Retail Pvt Ltd
        tradeName:
          type: string
          nullable: true
          example: Example Retail
        gstin:
          type: string
          example: 29ABCDE1234F1Z5
        status:
          $ref: '#/components/schemas/CompanyStatus'
        companyRole:
          $ref: '#/components/schemas/CompanyRole'
        membershipStatus:
          type: string
          enum: [active, invited]
        createdAt:
          $ref: '#/components/schemas/DateTime'
      additionalProperties: false

    CurrentUserCompaniesResponse:
      type: object
      required:
        - companies
      properties:
        companies:
          type: array
          items:
            $ref: '#/components/schemas/CurrentUserCompanyResponse'
      additionalProperties: false

    CompanyStatus:
      type: string
      enum: [pending_verification, verified, rejected, suspended]
      description: Company registration creates companies with pending_verification status.

    CompanyRole:
      type: string
      enum: [OWNER, ADMIN, MEMBER]
      description: Company membership role. Operational job permissions are deferred.

    RegisteredAddress:
      type: object
      required:
        - addressLine1
        - city
        - state
        - postalCode
        - country
      properties:
        addressLine1:
          type: string
        addressLine2:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
      additionalProperties: false

    CompanyResponse:
      type: object
      required:
        - companyUuid
        - legalName
        - gstin
        - contactEmailAddress
        - contactPhoneNumber
        - registeredAddress
        - status
      properties:
        companyUuid:
          allOf:
            - $ref: '#/components/schemas/UUID'
        companyCode:
          type: string
          nullable: true
          example: RET001
        legalName:
          type: string
          example: Example Retail Pvt Ltd
        tradeName:
          type: string
          nullable: true
          example: Example Retail
        gstin:
          type: string
          example: 29ABCDE1234F1Z5
        contactEmailAddress:
          type: string
          format: email
          example: accounts@example.com
        contactPhoneNumber:
          type: string
          example: "+919876543211"
        registeredAddress:
          $ref: '#/components/schemas/RegisteredAddress'
        status:
          $ref: '#/components/schemas/CompanyStatus'
      additionalProperties: false

    # ---------- ERROR ----------
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Request validation failed
        details:
          type: object
          nullable: true
          additionalProperties: true
      additionalProperties: false

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  # ---------- PUBLIC SIGNUP ----------
  /api/v1/signup:
    post:
      summary: Public user signup
      description: Creates only a global user identity. Company registration happens later through authenticated POST /api/v1/companies.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User created (pending verification)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  # ---------- EMAIL VERIFICATION ----------
  /api/v1/users/verify-email:
    post:
      summary: Verify user email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------- AUTH ----------
  /api/v1/auth/login:
    post:
      summary: Login and receive JWT + refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/auth/refresh:
    post:
      summary: Exchange refresh token for new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------- COMPANY / ADMIN ----------
  /api/v1/current-user/companies:
    get:
      summary: List current user companies
      description: Returns companies where the authenticated user has active or invited membership. Empty list means the frontend should show the company registration screen.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User company memberships
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserCompaniesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/companies:
    post:
      summary: Register a company
      description: Authenticated company registration. The requesting user becomes OWNER through CompanyUser membership. The company starts as pending_verification.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCompanyRequest'
      responses:
        '201':
          description: Company registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterCompanyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/companies/{companyUuid}/users:
    post:
      summary: Create a user inside a company (admin only)
      description: Future endpoint. OWNER or ADMIN may create a company user; invitation/reset flow is out of scope for the current registration implementation.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CompanyUuidPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompanyUserRequest'
      responses:
        '201':
          description: User created in company
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/companies/{companyUuid}/users/{userUuid}:
    get:
      summary: Get company-scoped user by UUID
      description: Authorization rule: the requested user may view self; same-company OWNER or ADMIN may view other company users; others are forbidden.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CompanyUuidPath'
        - $ref: '#/components/parameters/UserUuidPath'
      responses:
        '200':
          description: User record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/companies/{companyUuid}:
    get:
      summary: Get company metadata
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CompanyUuidPath'
      responses:
        '200':
          description: Company metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
