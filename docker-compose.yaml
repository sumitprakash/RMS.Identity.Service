version: "3.9"

services:
  rms.identity.db:
    image: mysql:8.4
    container_name: rms.identity.db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: rms_identity
      MYSQL_USER: rms_user
      MYSQL_PASSWORD: 12345678
    ports:
      - "3306:3306"
    volumes:
      - mysql_identity_data:/var/lib/mysql
      - ./reference/db/sql_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_identity_data:
